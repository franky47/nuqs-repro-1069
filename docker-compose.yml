configs:
  nginx_conf:
    content: |
      events {}

      http {
        log_format repro '$$status "$$request"';
        access_log /dev/stdout repro;

        # Backend target for proxy_pass tests
        server {
          listen 127.0.0.1:9000;
          return 200 "backend ok: $$request_uri\n";
        }

        server {
          listen 80;
          listen 81 http2;

          location /static {
            return 200 "static ok: $$request_uri\n";
          }

          location /proxy {
            proxy_pass http://127.0.0.1:9000;
          }
        }
      }

  nginx_7g_conf:
    # Query-string rule from the 7G Firewall nginx port, shipped as the
    # built-in WAF of GridPane/xCloud managed WordPress hosting.
    # https://perishablepress.com/7g-firewall/
    content: |
      events {}

      http {
        map $$query_string $$bad_querystring {
          default 0;
          "~*(~|`|<|>|%3c|%3e|\^|\||\\\\|0x00|%00|%0d%0a)" 1;
        }

        server {
          listen 80;

          location / {
            if ($$bad_querystring) {
              return 403;
            }
            return 200 "7g ok: $$request_uri\n";
          }
        }
      }

  nginx_tomcat_conf:
    content: |
      events {}

      http {
        server {
          listen 80;
          location / {
            proxy_pass http://tomcat-10:8080;
          }
        }
      }

  haproxy_cfg:
    content: |
      defaults
        mode http
        timeout connect 5s
        timeout client 30s
        timeout server 30s

      frontend fe
        bind :80
        default_backend be

      backend be
        server s1 backend:80

  envoy_yaml:
    content: |
      static_resources:
        listeners:
          - address: { socket_address: { address: 0.0.0.0, port_value: 80 } }
            filter_chains:
              - filters:
                  - name: envoy.filters.network.http_connection_manager
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                      stat_prefix: ingress
                      route_config:
                        virtual_hosts:
                          - name: all
                            domains: ["*"]
                            routes:
                              - match: { prefix: "/" }
                                route: { cluster: backend }
                      http_filters:
                        - name: envoy.filters.http.router
                          typed_config:
                            "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
        clusters:
          - name: backend
            type: STRICT_DNS
            load_assignment:
              cluster_name: backend
              endpoints:
                - lb_endpoints:
                    - endpoint:
                        address:
                          socket_address: { address: backend, port_value: 80 }

x-nginx: &nginx-common
  configs:
    - source: nginx_conf
      target: /etc/nginx/nginx.conf

services:
  nginx-1.18:
    <<: *nginx-common
    image: nginx:1.18
    ports:
      - '8118:80'
      - '9118:81'

  nginx-1.20:
    <<: *nginx-common
    image: nginx:1.20
    ports:
      - '8120:80'
      - '9120:81'

  nginx-1.24:
    <<: *nginx-common
    image: nginx:1.24
    ports:
      - '8124:80'
      - '9124:81'

  nginx-1.28:
    <<: *nginx-common
    image: nginx:1.28
    ports:
      - '8128:80'
      - '9128:81'

  nginx-latest:
    <<: *nginx-common
    image: nginx:latest
    ports:
      - '8199:80'
      - '9199:81'

  modsecurity-pl1:
    image: owasp/modsecurity-crs:nginx
    environment:
      BLOCKING_PARANOIA: '1'
      PARANOIA: '1'
      BACKEND: http://backend:80
    ports:
      - '8181:8080'

  modsecurity-pl2:
    image: owasp/modsecurity-crs:nginx
    environment:
      BLOCKING_PARANOIA: '2'
      PARANOIA: '2'
      BACKEND: http://backend:80
    ports:
      - '8182:8080'

  modsecurity-pl3:
    image: owasp/modsecurity-crs:nginx
    environment:
      BLOCKING_PARANOIA: '3'
      PARANOIA: '3'
      BACKEND: http://backend:80
    ports:
      - '8183:8080'

  modsecurity-pl4:
    image: owasp/modsecurity-crs:nginx
    environment:
      BLOCKING_PARANOIA: '4'
      PARANOIA: '4'
      BACKEND: http://backend:80
    ports:
      - '8184:8080'

  backend:
    <<: *nginx-common
    image: nginx:latest

  tomcat-9:
    image: tomcat:9
    ports:
      - '8209:8080'

  tomcat-10:
    image: tomcat:10.1
    ports:
      - '8210:8080'

  jetty:
    image: jetty:12.0-jre17
    ports:
      - '8211:8080'

  httpd:
    image: httpd:2.4
    ports:
      - '8212:80'

  haproxy:
    image: haproxy:3.0
    configs:
      - source: haproxy_cfg
        target: /usr/local/etc/haproxy/haproxy.cfg
    ports:
      - '8213:80'

  caddy:
    image: caddy:2
    ports:
      - '8214:80'

  envoy:
    image: envoyproxy/envoy:v1.32-latest
    configs:
      - source: envoy_yaml
        target: /etc/envoy/envoy.yaml
    ports:
      - '8215:80'

  openlitespeed:
    image: litespeedtech/openlitespeed
    ports:
      - '8216:8088'

  nginx-7g:
    image: nginx:latest
    configs:
      - source: nginx_7g_conf
        target: /etc/nginx/nginx.conf
    ports:
      - '8217:80'

  nginx-tomcat:
    image: nginx:latest
    configs:
      - source: nginx_tomcat_conf
        target: /etc/nginx/nginx.conf
    depends_on:
      - tomcat-10
    ports:
      - '8218:80'
